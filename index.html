<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#00bcd4">
<title>彩虹聊天</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#00bcd4;--secondary:#4dd0e1;--danger:#ff5252;--success:#4caf50;--bg:#ecf0f1;--text:#333}
html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
/* Login */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#00bcd4,#4dd0e1);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:1000}
#login.hide{display:none}
.logo{font-size:80px;margin-bottom:16px}
.title{font-size:32px;font-weight:700;color:#fff;margin-bottom:8px}
.subtitle{font-size:14px;color:rgba(255,255,255,.8);margin-bottom:32px}
.form{width:100%;max-width:300px}
.tabs{display:flex;background:rgba(255,255,255,.2);border-radius:24px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:10px;border:none;background:transparent;color:rgba(255,255,255,.9);font-size:14px;font-weight:500;cursor:pointer;border-radius:20px;transition:.2s}
.tab.active{background:#fff;color:#00bcd4}
.form-panel{display:none}
.form-panel.active{display:block}
.input{width:100%;padding:14px 16px;border:none;border-radius:12px;font-size:15px;margin-bottom:12px;background:rgba(255,255,255,.95);outline:none}
.input:focus{background:#fff;box-shadow:0 0 0 2px rgba(0,188,212,.2)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;background:#fff;color:#00bcd4;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:.2s}
.btn:active{transform:scale(.98)}
/* App */
#app{display:none;height:100vh;flex-direction:column;background:#fff}
#app.show{display:flex}
/* Header */
.header{height:56px;background:var(--primary);display:flex;align-items:center;padding:0 16px;box-shadow:0 2px 8px rgba(0,0,0,.1);color:#fff}
.header-title{flex:1;font-size:18px;font-weight:600}
.header-btn{width:40px;height:40px;border:none;background:rgba(255,255,255,.2);border-radius:50%;color:#fff;font-size:18px;cursor:pointer;transition:.2s}
.header-btn:active{background:rgba(255,255,255,.3)}
/* Main */
.main{flex:1;display:flex;overflow:hidden}
/* Sidebar */
.sidebar{width:280px;background:#f5f5f5;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:16px;border-bottom:1px solid #e0e0e0;display:flex;gap:8px}
.sidebar-btn{flex:1;padding:10px;border:none;background:var(--primary);color:#fff;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.search-box{padding:12px 16px;border-bottom:1px solid #e0e0e0}
.search-box input{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:20px;font-size:13px;outline:none}
.search-box input:focus{border-color:var(--primary)}
.chat-list{flex:1;overflow-y:auto}
.chat-item{padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:.2s;position:relative}
.chat-item:active{background:#e8f5e9}
.chat-item.active{background:var(--secondary);color:#fff}
.chat-header{display:flex;align-items:center;gap:8px}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-preview{font-size:12px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.chat-time{font-size:11px;opacity:.6}
.chat-badge{display:inline-block;background:var(--danger);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px}
/* Chat Area */
.chat-area{flex:1;display:flex;flex-direction:column;background:#fff}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#999;font-size:14px}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:8px;margin-bottom:8px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0;cursor:pointer}
.msg-bubble{max-width:70%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.msg.mine .msg-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg:not(.mine) .msg-bubble{background:#f0f0f0;color:var(--text);border-bottom-left-radius:4px}
.msg-img{max-width:200px;border-radius:12px;cursor:pointer}
.msg-time{font-size:11px;color:#999;margin-top:4px;text-align:center}
/* Input */
.input-area{padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0;display:flex;gap:8px;align-items:flex-end}
.input-field{flex:1;display:flex;gap:8px;flex-wrap:wrap}
.msg-input{flex:1;min-width:100px;padding:10px 14px;border:1px solid #e0e0e0;border-radius:20px;font-size:14px;outline:none;resize:none;max-height:100px;font-family:inherit}
.msg-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,188,212,.1)}
.icon-btn{width:40px;height:40px;border:none;background:transparent;color:var(--primary);font-size:20px;cursor:pointer;border-radius:50%;transition:.2s}
.icon-btn:active{background:rgba(0,188,212,.1)}
.send-btn{width:40px;height:40px;border:none;background:var(--primary);color:#fff;border-radius:50%;font-size:18px;cursor:pointer;transition:.2s}
.send-btn:active{background:#0097a7}
/* Emoji Picker */
.emoji-picker{display:none;position:absolute;bottom:60px;right:16px;background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.15);padding:12px;z-index:100;max-width:300px}
.emoji-picker.show{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.emoji-btn{width:40px;height:40px;border:none;background:#f0f0f0;border-radius:8px;font-size:24px;cursor:pointer;transition:.2s}
.emoji-btn:active{background:var(--primary);transform:scale(.9)}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:24px;max-width:350px;width:90%;box-shadow:0 8px 24px rgba(0,0,0,.2);max-height:80vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px}
.modal-input{width:100%;padding:12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.modal-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,188,212,.1)}
.modal-buttons{display:flex;gap:8px}
.modal-btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.modal-btn.primary{background:var(--primary);color:#fff}
.modal-btn.secondary{background:#f0f0f0;color:var(--text)}
.member-list{max-height:300px;overflow-y:auto}
.member-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
.member-avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;margin-right:12px;flex-shrink:0}
.member-info{flex:1}
.member-name{font-size:14px;font-weight:500}
.member-status{font-size:12px;color:#999}
/* Responsive */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;max-height:200px;border-right:none;border-bottom:1px solid #e0e0e0}
  .main{flex-direction:column}
  .msg-bubble{max-width:85%}
  .emoji-picker{right:auto;left:16px}
}
</style>
</head>
<body>
<!-- Login -->
<div id="login">
  <div class="logo">💬</div>
  <div class="title">彩虹聊天</div>
  <div class="subtitle">彩虹桥，靠近一点让我看看你！</div>
  <div class="form">
    <div class="tabs">
      <button class="tab active" onclick="app.switchTab('login')">登录</button>
      <button class="tab" onclick="app.switchTab('register')">注册</button>
    </div>
    <div id="loginPanel" class="form-panel active">
      <input class="input" id="loginUser" placeholder="用户名/手机号">
      <input class="input" id="loginPwd" type="password" placeholder="密码">
      <button class="btn" onclick="app.login()">登录</button>
    </div>
    <div id="registerPanel" class="form-panel">
      <input class="input" id="regUser" placeholder="用户名">
      <input class="input" id="regPhone" placeholder="手机号">
      <input class="input" id="regPwd" type="password" placeholder="密码">
      <button class="btn" onclick="app.register()">注册</button>
    </div>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-title" id="headerTitle">彩虹聊天</div>
    <button class="header-btn" onclick="app.showNotifications()" style="position:relative">
      🔔
      <span id="notificationBadge" style="position:absolute;top:0;right:0;width:16px;height:16px;background:var(--danger);color:#fff;font-size:10px;border-radius:50%;display:none;line-height:16px">0</span>
    </button>
    <button class="header-btn" onclick="app.showProfile()">👤</button>
    <button class="header-btn" onclick="app.logout()">🚪</button>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <button class="sidebar-btn" onclick="app.showNewChat()">+ 聊天</button>
        <button class="sidebar-btn" onclick="app.showNewGroup()">+ 群组</button>
      </div>
      <div class="search-box">
        <input id="searchInput" placeholder="搜索聊天..." onkeyup="app.searchChats()">
      </div>
      <div class="chat-list" id="chatList"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-empty" id="chatEmpty">选择一个聊天开始</div>
      <div class="messages" id="messages" style="display:none"></div>
      <div class="input-area" id="inputArea" style="display:none">
        <div class="input-field">
          <button class="icon-btn" onclick="app.sendImage()">📷</button>
          <button class="icon-btn" onclick="app.toggleEmojiPicker()">😊</button>
          <input class="msg-input" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();app.sendMsg()}">
        </div>
        <button class="send-btn" onclick="app.sendMsg()">➤</button>
      </div>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
  </div>
</div>

<!-- Modals -->
<div id="newChatModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">新建聊天</div>
    <div class="member-list" id="contactsList"></div>
    <div class="modal-buttons" style="margin-top:16px">
      <button class="modal-btn secondary" onclick="app.closeModal('newChatModal')">取消</button>
    </div>
  </div>
</div>

<div id="newGroupModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">新建群组</div>
    <input class="modal-input" id="newGroupName" placeholder="群组名称">
    <div style="font-size:13px;color:#666;margin-bottom:12px">选择成员：</div>
    <div class="member-list" id="groupMembersList" style="max-height:200px"></div>
    <div class="modal-buttons" style="margin-top:16px">
      <button class="modal-btn secondary" onclick="app.closeModal('newGroupModal')">取消</button>
      <button class="modal-btn primary" onclick="app.createGroup()">创建</button>
    </div>
  </div>
</div>

<div id="profileModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">个人信息</div>
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:48px;margin-bottom:8px" id="profileAvatar">👤</div>
      <div id="profileName" style="font-size:16px;font-weight:600"></div>
      <div id="profilePhone" style="font-size:12px;color:#999;margin-top:4px"></div>
    </div>
    <div style="background:#f5f5f5;padding:12px;border-radius:8px;margin-bottom:16px">
      <div style="font-size:12px;color:#999">收藏的表情</div>
      <div id="collectedEmojis" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px"></div>
    </div>
    <div class="modal-buttons">
      <button class="modal-btn secondary" onclick="app.closeModal('profileModal')">关闭</button>
    </div>
  </div>
</div>

<div id="notificationsModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">通知</div>
    <div id="notificationsList" style="max-height:300px;overflow-y:auto"></div>
    <div class="modal-buttons" style="margin-top:16px">
      <button class="modal-btn secondary" onclick="app.closeModal('notificationsModal')">关闭</button>
    </div>
  </div>
</div>

<script src="js/chat.js"></script>
</body>
</html>
